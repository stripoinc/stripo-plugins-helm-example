image:
  pullPolicy: IfNotPresent
  # Overrides the image tag with the latest release tag value
  tag: "latest"

resources:
  limits:
    memory: 1000Mi
    cpu: 1000m
  requests:
    memory: 640Mi
    cpu: 100m

# In case of autoscaling is disabled
#replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

settings:
  profile: PLUGINS
#  logstash:
#    host: logstash
#    port: "5008"

env:
  - name: JAVA_TOOL_OPTIONS
    value: -Xss256k -Xms400m -Xmx512m -XX:ReservedCodeCacheSize=128M

configmap:
  enabled: true
  extraScrapeConfigs:
    application.properties: |
      logging.level.root=INFO
      spring.datasource.url=jdbc:postgresql://postgres:5432/stripo_plugin_local_widgets_registry
      spring.datasource.username=user_widgets_registry
      spring.datasource.password=password_widgets_registry
      shared.modules.mode=follower
      shared.modules.owner.base-url=https://my.stripo.email/bapi/widgets/registry
      shared.modules.sse.enabled=true
      shared.modules.auth.client.api-key=my-api-key
